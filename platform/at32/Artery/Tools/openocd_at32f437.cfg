# OpenOCD config for AT32F437 with AT-Link (CMSIS-DAP)

source [find interface/cmsis-dap.cfg]

transport select swd

set CHIPNAME at32f437
set WORKAREASIZE 0x10000

# AT32F437 is Cortex-M4
set CPUTAPID 0x2ba01477

adapter speed 4000

# Create DAP
swd newdap $CHIPNAME cpu -irlen 4 -expected-id $CPUTAPID

# Create target
dap create $CHIPNAME.dap -chain-position $CHIPNAME.cpu
target create $CHIPNAME.cpu cortex_m -dap $CHIPNAME.dap

# Work area in SRAM
$CHIPNAME.cpu configure -work-area-phys 0x20000000 -work-area-size $WORKAREASIZE -work-area-backup 0

# Flash (AT32F437 has 4MB flash, similar to STM32F4)
flash bank $CHIPNAME.flash stm32f2x 0x08000000 0 0 0 $CHIPNAME.cpu

# Reset config
reset_config srst_nogate

init
